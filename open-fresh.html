<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        // Redirect to index.html with cache-busting parameter
        const timestamp = new Date().getTime();
        window.location.href = `index.html?v=${timestamp}`;
    </script>
</head>
<body>
    <p>Redirecting to fresh version...</p>
    <p>If not redirected, <a href="index.html">click here</a></p>
</body>
</html>
