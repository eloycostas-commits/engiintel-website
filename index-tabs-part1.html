<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EngiIntel — AI Document Intelligence for Regulated Industries</title>
<meta name="description" content="Self-hosted AI platform with 6 modular capabilities">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>
.tabs-container{border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:80px;z-index:90;padding:0 60px}
.tabs{display:flex;gap:0;overflow-x:auto}
.tab{padding:20px 32px;font-family:"DM Mono",monospace;font-size:0.82rem;letter-spacing:0.05em;color:var(--text-dim);cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s;white-space:nowrap;display:flex;align-items:center;gap:8px}
.tab:hover{color:var(--accent);background:rgba(0,212,255,0.05)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(0,212,255,0.08)}
.tab-content{display:none}
.tab-content.active{display:block}
.hero{min-height:80vh;display:flex;align-items:center;padding:140px 60px 80px;background:linear-gradient(135deg,rgba(0,212,255,0.08),rgba(0,102,255,0.05))}
.hero-content{max-width:700px}
h1{font-size:clamp(2.8rem,5vw,4.5rem);line-height:1.05;margin-bottom:24px}
.hero-sub{font-size:1.2rem;color:var(--text-mid);line-height:1.7;margin-bottom:36px}
.hero-actions{display:flex;gap:16px;flex-wrap:wrap}
.module-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;padding:80px 60px}
.module-card{background:var(--surface);border:1px solid var(--border);padding:40px;transition:all 0.3s;cursor:pointer}
.module-card:hover{border-color:var(--accent);transform:translateY(-4px);box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.module-icon{font-size:2.5rem;margin-bottom:20px;display:block}
.module-title{font-family:"Syne",sans-serif;font-weight:700;font-size:1.2rem;margin-bottom:12px}
.module-desc{font-size:0.95rem;color:var(--text-dim);line-height:1.7}
@media (max-width:768px){
  .tabs-container{padding:0 20px;top:70px}
  .tab{padding:16px 20px;font-size:0.75rem}
  .hero{padding:120px 20px 60px}
  .module-grid{grid-template-columns:1fr;padding:60px 20px}
}
</style>
</head>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<nav id="mainNav">
  <a href="#" class="nav-logo">Engi<span>Intel</span></a>
  <ul class="nav-links">

    <li><a href="#contact" class="nav-cta" data-en="Book a Demo" data-es="Solicitar Demo">Book a Demo</a></li>
  </ul>
  <div class="lang-switch">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('es')">ES</button>
  </div>
</nav>
